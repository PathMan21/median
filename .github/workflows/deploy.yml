name: CI/CD - Build, Test, Infra & Deploy

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  id-token: write # OIDC pour azure/login
  contents: read

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ----------------------------------------------------------------------------
  # 1. TEST — build & tests avant tout déploiement
  # ----------------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    env:
      # Valeur factice : suffit à `prisma generate` et aux tests unitaires (pas de connexion réelle)
      DATABASE_URL: "postgresql://user:pass@localhost:5432/median-db?schema=public"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Backend - install
        working-directory: backend
        run: npm ci

      - name: Backend - prisma generate
        working-directory: backend
        run: npx prisma generate

      - name: Backend - tests
        working-directory: backend
        run: npm test

      - name: Frontend - install & build
        working-directory: frontend
        run: |
          npm ci
          npm run build

  # ----------------------------------------------------------------------------
  # 2. INFRA — Terraform (crée/maj ACR, ACA, Postgres, Key Vault, observabilité)
  # ----------------------------------------------------------------------------
  infra:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      acr_name: ${{ steps.tf_out.outputs.acr_name }}
      resource_group: ${{ steps.tf_out.outputs.resource_group }}
      backend_app: ${{ steps.tf_out.outputs.backend_app }}
      frontend_app: ${{ steps.tf_out.outputs.frontend_app }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: infra
        env:
          ARM_USE_OIDC: "true"
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.TFSTATE_RG }}" \
            -backend-config="storage_account_name=${{ secrets.TFSTATE_SA }}" \
            -backend-config="container_name=${{ secrets.TFSTATE_CONTAINER }}" \
            -backend-config="key=learnstudio.tfstate"

      - name: Terraform Plan
        working-directory: infra
        env:
          ARM_USE_OIDC: "true"
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_postgres_admin_password: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
          TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
        run: terraform plan -input=false -out=tfplan

      - name: Terraform Apply
        working-directory: infra
        env:
          ARM_USE_OIDC: "true"
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: terraform apply -input=false -auto-approve tfplan

      - name: Export Terraform outputs
        id: tf_out
        working-directory: infra
        run: |
          echo "acr_name=$(terraform output -raw acr_name)" >> "$GITHUB_OUTPUT"
          echo "resource_group=$(terraform output -raw resource_group)" >> "$GITHUB_OUTPUT"
          echo "backend_app=$(terraform output -raw backend_app_name)" >> "$GITHUB_OUTPUT"
          echo "frontend_app=$(terraform output -raw frontend_app_name)" >> "$GITHUB_OUTPUT"

  # ----------------------------------------------------------------------------
  # 3. BUILD & PUSH — images Docker vers l'ACR (créé par l'étape infra)
  # ----------------------------------------------------------------------------
  build-push:
    needs: infra
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login ACR
        run: az acr login --name ${{ needs.infra.outputs.acr_name }}

      - name: Build & Push Backend
        run: |
          REG=${{ needs.infra.outputs.acr_name }}.azurecr.io
          docker build -t $REG/backend:${{ env.IMAGE_TAG }} -t $REG/backend:latest ./backend
          docker push $REG/backend:${{ env.IMAGE_TAG }}
          docker push $REG/backend:latest

      - name: Build & Push Frontend
        run: |
          REG=${{ needs.infra.outputs.acr_name }}.azurecr.io
          docker build -t $REG/frontend:${{ env.IMAGE_TAG }} -t $REG/frontend:latest ./frontend
          docker push $REG/frontend:${{ env.IMAGE_TAG }}
          docker push $REG/frontend:latest

  # ----------------------------------------------------------------------------
  # 4. DEPLOY — pointe les Container Apps sur les nouvelles images
  # ----------------------------------------------------------------------------
  deploy:
    needs: [infra, build-push]
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Backend
        run: |
          az containerapp update \
            --name ${{ needs.infra.outputs.backend_app }} \
            --resource-group ${{ needs.infra.outputs.resource_group }} \
            --image ${{ needs.infra.outputs.acr_name }}.azurecr.io/backend:${{ env.IMAGE_TAG }}

      - name: Deploy Frontend
        run: |
          az containerapp update \
            --name ${{ needs.infra.outputs.frontend_app }} \
            --resource-group ${{ needs.infra.outputs.resource_group }} \
            --image ${{ needs.infra.outputs.acr_name }}.azurecr.io/frontend:${{ env.IMAGE_TAG }}
