<div class="cinemas-page container animate-fade-in">
    <header class="page-header">
        <div class="header-main">
            <h1 class="font-display text-gradient">Nos Établissements</h1>
            <p class="muted">Des lieux d'exception pour des moments inoubliables.</p>
        </div>

        @if (auth.isAdmin()) {
        <div class="header-actions">
            <button class="btn btn-primary" (click)="openForm()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                Ajouter un Cinéma
            </button>
        </div>
        }
    </header>

    @if (loading) {
    <div class="modern-loader">
        <div class="loader-pulse shadow-neon"></div>
        <p>Localisation des salles...</p>
    </div>
    } @else if (cinemas.length === 0) {
    <div class="empty-state glass">
        <div class="empty-icon shadow-neon">🎭</div>
        <h3>Aucun établissement</h3>
        <p class="muted">Nous n'avons pas encore de salles partenaires.</p>
    </div>
    } @else {
    <div class="cinemas-grid">
        @for (c of cinemas; track c.id) {
        <app-cinema-card [cinema]="c" [showAdmin]="auth.isAdmin()" (edit)="openForm($event)"
            (delete)="onDelete($event)"></app-cinema-card>
        }
    </div>
    }

    <!-- Cinema Management Modal -->
    <app-cinema-form [isOpen]="formOpen" [cinema]="selectedCinema" [loading]="formLoading" [error]="formError"
        (save)="onSave($event)" (cancel)="formOpen = false"></app-cinema-form>
</div>
