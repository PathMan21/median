<app-modal [isOpen]="isOpen" (closed)="cancelled.emit()">
    <div class="booking-form-v2">
        <header class="form-header">
            <h2 class="font-display text-gradient">Réserver ma séance</h2>
            <p class="muted">Sélectionnez vos préférences pour une expérience sur mesure.</p>
        </header>

        <app-alert [message]="error" type="error"></app-alert>

        <form [formGroup]="form" (ngSubmit)="submit()" class="modern-form">
            <div class="form-grid">
                <div class="form-group full-width">
                    <label for="filmId" class="form-label">Film</label>
                    <div class="select-wrapper">
                        <select formControlName="filmId" id="filmId" class="modern-input">
                            <option value="">Sélectionnez un film</option>
                            @for (f of films; track f.id) {
                            <option [value]="f.id">{{ f.title }}</option>
                            }
                        </select>
                    </div>
                </div>

                <div class="form-group full-width">
                    <label for="cinemaId" class="form-label">Établissement</label>
                    <div class="select-wrapper">
                        <select formControlName="cinemaId" id="cinemaId" class="modern-input">
                            <option value="">Sélectionnez un cinéma</option>
                            @for (c of cinemas; track c.id) {
                            <option [value]="c.id">{{ c.name }} — {{ c.city }}</option>
                            }
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="bookingDate" class="form-label">Date & Heure</label>
                    <input formControlName="bookingDate" id="bookingDate" type="datetime-local" class="modern-input" />
                </div>

                <div class="form-group">
                    <label for="numberOfSeats" class="form-label">Nombre de Places</label>
                    <input formControlName="numberOfSeats" id="numberOfSeats" type="number" min="1" max="20" class="modern-input" />
                </div>

                <div class="form-group full-width">
                    <label for="totalPrice" class="form-label">Prix Total Global (€)</label>
                    <div class="price-input-wrapper">
                        <span class="currency-tag">EUR</span>
                        <input formControlName="totalPrice" id="totalPrice" type="number" step="0.01" min="0" placeholder="0.00"
                            class="modern-input price-input" />
                    </div>
                </div>
            </div>

            <div class="form-footer">
                <button type="button" class="btn btn-outline" (click)="cancelled.emit()">Annuler</button>
                <button type="submit" class="btn btn-primary" [disabled]="form.invalid || loading">
                    @if (!loading) {
                    <span>Confirmer la Réservation</span>
                    } @else {
                    <span class="loader-dots">Validation...</span>
                    }
                </button>
            </div>
        </form>
    </div>
</app-modal>
