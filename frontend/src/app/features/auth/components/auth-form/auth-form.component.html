

<form [formGroup]="form" (ngSubmit)="submitted.emit()" class="auth-form">
    <div class="form-group">
        <label for="login" class="form-label">Identifiant / Nom d'utilisateur</label>
        <div class="input-wrapper">
            <input formControlName="login" id="login" type="text" [placeholder]="loginPlaceholder"
                [autocomplete]="isLogin ? 'username' : 'username'" class="modern-input" />
        </div>
    </div>
    <div  *ngIf="!isLogin" class="form-group">
        <label for="email" class="form-label">Email</label>
        <div class="input-wrapper">
            <input formControlName="email" id="email" type="email" placeholder="mail"
                class="modern-input" />
        </div>
    </div>
    <div class="form-group">
        <label for="hs-strong-password-with-indicator-and-hint" class="form-label">Mot de passe</label>
        <div class="input-wrapper">
            <input formControlName="password" id="hs-strong-password-with-indicator-and-hint" type="password" placeholder="••••••••"
                [autocomplete]="isLogin ? 'current-password' : 'new-password'" class="modern-input" />
            <div class="flex mt-2 -mx-1 w-full">
                <div class="h-2 flex-auto rounded-full bg-primary opacity-25 mx-1 overflow-hidden">

                </div>

            </div>
        </div>

    </div>

    <button type="submit" class="btn btn-primary full-width" [disabled]="form.invalid || loading">
        @if (!loading) {
        <span>{{ submitLabel }}</span>
        } @else {
        <span class="loader-dots">{{ loadingLabel }}</span>
        }
    </button>
</form>
