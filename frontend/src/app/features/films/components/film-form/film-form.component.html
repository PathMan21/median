<app-modal [isOpen]="isOpen" (closed)="cancelled.emit()">
    <div class="film-form-v2">
        <header class="form-header">
            <h2 class="font-display text-gradient">{{ editMode ? 'Éditer le Chef-d\'œuvre' : 'Nouvelle Production' }}
            </h2>
            <p class="muted">{{ editMode ? 'Ajustez les détails de la production.' : 'Enregistrez une nouvelle œuvre
                dans la base de données.' }}</p>
        </header>

        <app-alert [message]="error" type="error"></app-alert>

        <form [formGroup]="form" (ngSubmit)="submit()" class="modern-form">
            <div class="form-grid">
                <div class="form-group full-width">
                    <label for="title" class="form-label">Titre du Film</label>
                    <input formControlName="title" id="title" type="text" placeholder="Ex: Inception" class="modern-input" />
                </div>

                <div class="form-group">
                    <label for="genre" class="form-label">Genre</label>
                    <input formControlName="genre" id="genre" type="text" placeholder="Action, Sci-Fi..." class="modern-input" />
                </div>

                <div class="form-group">
                    <label for="duration" class="form-label">Durée (minutes)</label>
                    <input formControlName="duration" id="duration" type="number" min="1" class="modern-input" />
                </div>

                <div class="form-group full-width">
                    <label for="description" class="form-label">Synopsis / Description</label>
                    <textarea formControlName="description" id="description" rows="4" placeholder="Résumé de l'intrigue..."
                        class="modern-input"></textarea>
                </div>

                <div class="form-group full-width">
                    <label for="releaseDate" class="form-label">Date de Sortie Nationale</label>
                    <input formControlName="releaseDate" id="releaseDate" type="date" class="modern-input" />
                </div>
            </div>

            <div class="form-footer">
                <button type="button" class="btn btn-outline" (click)="cancelled.emit()">Abandonner</button>
                <button type="submit" class="btn btn-primary" [disabled]="form.invalid || loading">
                    @if (!loading) {
                    <span>{{ editMode ? 'Mettre à jour' : 'Publier' }}</span>
                    } @else {
                    <span class="loader-dots">Traitement...</span>
                    }
                </button>
            </div>
        </form>
    </div>
</app-modal>
