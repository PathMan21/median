<div class="film-card-v2 animate-fade-in">
    <div class="poster-container" (click)="book.emit(film)">
        <!-- Abstract Cinema Placeholder -->
        <div class="poster-placeholder" [style.background]="getGradient(film.genre)">
            <div class="genre-tag">{{ film.genre }}</div>
        </div>

        <div class="poster-overlay glass-overlay">
            <div class="overlay-content">
                <h3 class="overlay-title">{{ film.title }}</h3>
                <p class="film-desc">{{ film.description | slice:0:100 }}...</p>
                <div class="meta-row">
                    <span class="meta-pill">{{ film.duration }} min</span>
                    <span class="meta-pill">{{ film.releaseDate | date:'yyyy' }}</span>
                </div>
            </div>
        </div>
    </div>

    <div class="card-info">
        @if (showActions || showAdmin) {
        <div class="card-actions">
            @if (showActions) {
            <button class="btn btn-primary btn-sm flex-grow" (click)="book.emit(film)">
                Réserver ma séance
            </button>
            }

            @if (showAdmin) {
            <div class="admin-actions">
                <button class="btn btn-outline btn-sm icon-btn" (click)="edit.emit(film)" title="Modifier">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                        <path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                    </svg>
                </button>
                <button class="btn btn-outline btn-sm icon-btn delete-btn" (click)="delete.emit(film)"
                    title="Supprimer">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="3 6 5 6 21 6"></polyline>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                        <line x1="10" y1="11" x2="10" y2="17"></line>
                        <line x1="14" y1="11" x2="14" y2="17"></line>
                    </svg>
                </button>
            </div>
            }
        </div>
        }
    </div>
</div>
